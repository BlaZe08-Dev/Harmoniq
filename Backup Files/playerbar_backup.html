<!-- PLAYER -->
<div class="player-bar">

    <div class="player-left">
        <img id="playerThumbnail" src="">
        
        <div class="player-info">
            <div id="nowPlaying">No song</div>
            <div id="artistName">Artist</div>
        </div>


        <!-- ➕ ADD TO PLAYLIST -->
        <button id="addBtn">
            <span>+</span>
        </button>

    </div>

    <div class="player-center">

        <div class="player-controls">
            <button class="control-btn" id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
            <button onclick="playPrevious()">⏮</button>

            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>

            <button onclick="playNext()">⏭</button>
            <button class="control-btn" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
        </div>

        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressBar" min="0" max="100"
                   onchange="seekAudio(this.value)">
            <span id="durationText">0:00</span>
        </div>

    </div>

    <div class="player-right">
        <div class="volume-wrapper">
            <span id="volumeIcon">🔊</span>
            <input type="range" id="volumeControl" min="0" max="1" step="0.01"
            onchange="setVolume(this.value)">
        </div>

        <div class="equalizer">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- ⬆️ MOVE EXPAND BUTTON HERE -->
        <button id="expandBtn" title="Expand Player">
            <svg id="expandIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path id="expandPath" d="M3 3h6v2H5v4H3V3zm16 0v6h-2V5h-4V3h6zM3 15h2v4h4v2H3v-6zm16 0h2v6h-6v-2h4v-4z"/>
            </svg>
        </button>
    </div>

</div>
