<!DOCTYPE html>
<html>
<head>
    <title>Smart Music App 🎧</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🎵 Smart Music App</h1>
<p>Choose your vibe</p>

<div class="container">

    <form method="POST">
        <button class="card" name="mood" value="study">📚 Study</button>
        <button class="card" name="mood" value="gym">💪 Gym</button>
        <button class="card" name="mood" value="sad">😔 Sad</button>
        <button class="card" name="mood" value="chill">😌 Chill</button>
        <button class="card" name="mood" value="gaming">🎮 Gaming</button>
    </form>

</div>

{% if video_id %}
    <div class="player">
        <h2>Now Playing</h2>

        <iframe
        src="https://www.youtube.com/embed/{{ video_id }}"
        allowfullscreen>
        </iframe>

        <form method="POST">
            <input type="hidden" name="mood" value="{{ mood }}">
            <input type="hidden" name="index" value="{{ index + 1 }}">
            <button class="next-btn">⏭ Next</button>
        </form>
    </div>
{% endif %}

</body>
</html>
