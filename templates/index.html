<!DOCTYPE html>
<html>
<head>
    <title>Smart Music App 🎧</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>🎵 Smart Music App</h1>
<p>Search, queue & enjoy music</p>

<!-- 🔍 SEARCH -->
<div class="search-container">
    <form onsubmit="handleSearch(event)">
        <input type="text" id="searchInput"
               placeholder="Search songs..."
               oninput="debouncedSearch()">
        <button type="submit">🔍</button>
    </form>

    <div id="results"></div>
</div>

<!-- 🎶 QUEUE -->
<div class="queue-container">
    <div class="queue-header">
        <h3>🎶 Your Queue</h3>
        <button onclick="clearQueue()">🗑</button>
    </div>
    <div id="queueList"></div>
</div>

<!-- 🎬 PLAYER -->
<div class="player">
    <h2>Now Playing</h2>
    <div id="player"></div>
    <button onclick="playNext()">⏭ Next</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let playerReady = false;
let queue = [];
let currentIndex = 0;
let debounceTimer;

window.onload = () => {
    document.getElementById("searchInput").focus();
    loadQueue();
};

/* 🎬 Player */
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '400',
        width: '100%',
        videoId: '',
        events: {
            'onReady': () => {
                playerReady = true;
                if (queue.length > 0) {
                    playVideo(queue[currentIndex].video_id);
                }
            },
            'onStateChange': onPlayerStateChange
        }
    });
}

function onPlayerStateChange(event) {
    if (event.data === 0) {
        playNext();
    }
}

/* 🔍 SEARCH */
function handleSearch(e) {
    e.preventDefault();
    searchMusic();
}

function debouncedSearch() {
    let query = document.getElementById("searchInput").value;

    if (!query.trim()) {
        document.getElementById("results").innerHTML = "";
        return;
    }

    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(searchMusic, 400);
}

function searchMusic() {
    let query = document.getElementById("searchInput").value;

    fetch("/search", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query })
    })
    .then(res => res.json())
    .then(data => showResults(data));
}

function showResults(data) {
    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    data.forEach(item => {
        let div = document.createElement("div");
        div.className = "result-item";

        div.innerHTML = `
            <img src="${item.thumbnail}">
            <div>${item.title}</div>
        `;

        div.onclick = () => addToQueue(item);

        resultsDiv.appendChild(div);
    });
}

/* 🔥 ADD + PLAY */
function addToQueue(item) {
    queue.push(item);
    currentIndex = queue.length - 1;
    playVideo(item.video_id);

    updateQueueUI();
    saveQueue();
}

/* 🎧 PLAY */
function playVideo(videoId) {
    if (!playerReady) {
        setTimeout(() => playVideo(videoId), 500);
        return;
    }
    player.loadVideoById(videoId);
}

/* ⏭ NEXT */
function playNext() {
    currentIndex++;

    if (currentIndex >= queue.length) {
        return;
    }

    playVideo(queue[currentIndex].video_id);
    updateQueueUI();
    saveQueue();
}

/* 🎶 QUEUE UI (CLICKABLE) */
function updateQueueUI() {
    let qDiv = document.getElementById("queueList");
    qDiv.innerHTML = "";

    queue.forEach((item, index) => {
        let div = document.createElement("div");
        div.className = "queue-item";

        if (index === currentIndex) {
            div.classList.add("active");
        }

        let thumbnail = item.thumbnail || "https://img.icons8.com/ios-filled/50/ffffff/music.png";

        let parts = item.title.split("-");
        let title = parts[0];
        let artist = parts[1] || "Unknown";

        div.innerHTML = `
            <div class="queue-index">
                ${index === currentIndex ? "▶" : index + 1}
            </div>

            <img class="queue-thumb" src="${thumbnail}">

            <div class="queue-text">
                <div class="queue-title">${title}</div>
                <div class="queue-artist">${artist}</div>
            </div>

            <div class="queue-controls">
                <button onclick="event.stopPropagation(); moveUp(${index})">↑</button>
                <button onclick="event.stopPropagation(); moveDown(${index})">↓</button>
                <button onclick="event.stopPropagation(); removeFromQueue(${index})">✖</button>
            </div>
        `;

        div.onclick = () => {
            currentIndex = index;
            playVideo(item.video_id);
            updateQueueUI();
            saveQueue();
        };

        qDiv.appendChild(div);
    });
}

/* ❌ REMOVE */
function removeFromQueue(index) {
    queue.splice(index, 1);

    if (index <= currentIndex && currentIndex > 0) {
        currentIndex--;
    }

    updateQueueUI();
    saveQueue();
}

/* 🔼 MOVE */
function moveUp(index) {
    if (index === 0) return;
    [queue[index], queue[index - 1]] = [queue[index - 1], queue[index]];
    updateQueueUI();
    saveQueue();
}

function moveDown(index) {
    if (index === queue.length - 1) return;
    [queue[index], queue[index + 1]] = [queue[index + 1], queue[index]];
    updateQueueUI();
    saveQueue();
}

/* 🗑 CLEAR */
function clearQueue() {
    queue = [];
    currentIndex = 0;
    updateQueueUI();
    localStorage.clear();
}

/* 💾 SAVE */
function saveQueue() {
    localStorage.setItem("musicQueue", JSON.stringify(queue));
    localStorage.setItem("currentIndex", currentIndex);
}

/* 📂 LOAD */
function loadQueue() {
    let savedQueue = localStorage.getItem("musicQueue");
    let savedIndex = localStorage.getItem("currentIndex");

    if (savedQueue) {
        queue = JSON.parse(savedQueue);
        currentIndex = savedIndex ? parseInt(savedIndex) : 0;
        updateQueueUI();
    }
}
</script>

</body>
</html>
