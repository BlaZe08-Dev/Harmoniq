<!DOCTYPE html>
<html>
<head>
    <title>Smart Music App 🎧</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div id="sidebarTrigger"></div>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>🎵 Music</h2>

        <p onclick="showHome()">🏠 Home</p>
        <p onclick="showQueue()">📜 Queue</p>

        <h3>📂 Playlists</h3>
        <button onclick="createPlaylist()">+ New Playlist</button>
        <div id="playlistList"></div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- SEARCH -->
        <div class="search-container">
            <form id="searchForm">
                <input type="text" id="searchInput" placeholder="Search music...">
                <button type="submit">🔍</button>
            </form>
            <div id="results"></div>
        </div>

        <!-- HOME -->
        <div id="homePage" class="home-feed">
            <h2 class="home-title">🎧 Recommended for you</h2>
            <div id="recommendList"></div>
        </div>

        <!-- QUEUE -->
        <div id="queuePage" style="display:none;">
            <h2>🎶 Your Queue</h2>
            <div id="queueList"></div>
        </div>

        <!-- PLAYLIST -->
        <div id="playlistPage" style="display:none;">
            <h2 id="playlistTitle">Playlist</h2>
            <div id="playlistSongs"></div>
        </div>

    </div>
</div>

<audio id="audioPlayer"></audio>

<!-- PLAYER -->
<div class="player-bar">

    <div class="player-left">
        <img id="playerThumbnail" src="">
        <div class="player-info">
            <div id="nowPlaying">No song</div>
            <div id="artistName">Artist</div>
        </div>
    </div>

    <div class="player-center">

        <div class="player-controls">
            <button onclick="toggleShuffle()">🔀</button>
            <button onclick="playPrevious()">⏮</button>

            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>

            <button onclick="playNext()">⏭</button>
            <button onclick="toggleRepeat()">🔁</button>
        </div>

        <div class="progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressBar" min="0" max="100"
                   onchange="seekAudio(this.value)">
            <span id="durationText">0:00</span>
        </div>

    </div>

    <div class="player-right">
        <span>🔊</span>
        <input type="range" id="volumeControl" min="0" max="1" step="0.01"
               onchange="setVolume(this.value)">
    </div>

</div>

<script>
let queue = [];
let currentIndex = -1;
let isShuffle = false;
let isRepeat = false;
let debounceTimer;

let playlists = JSON.parse(localStorage.getItem("playlists")) || {};

const audio = document.getElementById("audioPlayer");

const searchInput = document.getElementById("searchInput");
const results = document.getElementById("results");
const searchForm = document.getElementById("searchForm");
const queueList = document.getElementById("queueList");

/* SIDEBAR */
const sidebar = document.getElementById("sidebar");
const trigger = document.getElementById("sidebarTrigger");

trigger.addEventListener("mouseenter", () => {
    sidebar.classList.add("active");
    document.body.classList.add("sidebar-open");
});

sidebar.addEventListener("mouseleave", () => {
    sidebar.classList.remove("active");
    document.body.classList.remove("sidebar-open");
});

/* NAV */
function showHome() {
    document.getElementById("homePage").style.display = "block";
    document.getElementById("queuePage").style.display = "none";
    document.getElementById("playlistPage").style.display = "none";
}

function showQueue() {
    document.getElementById("homePage").style.display = "none";
    document.getElementById("queuePage").style.display = "block";
    document.getElementById("playlistPage").style.display = "none";
}

/* SEARCH */
searchForm.addEventListener("submit", e => {
    e.preventDefault();
    searchMusic();
});

searchInput.addEventListener("input", () => {
    let q = searchInput.value.trim();

    if (!q) {
        results.innerHTML = "";
        return;
    }

    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(searchMusic, 400);
});

/* CLOSE SUGGESTIONS WHEN CLICK OUTSIDE */
document.addEventListener("click", function(e) {
    if (!e.target.closest(".search-container")) {
        results.innerHTML = "";
    }
});

function searchMusic() {
    fetch("/search", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query: searchInput.value })
    })
    .then(res => res.json())
    .then(showResults);
}

function showResults(data) {
    results.innerHTML = "";

    data.forEach(item => {
        let div = document.createElement("div");
        div.className = "result-item";

        div.innerHTML = `
            <img src="${item.thumbnail}">
            <div>
                <div>${item.title}</div>
                <small>${item.artist}</small>
            </div>
        `;

        div.onclick = () => addToQueue(item);
        results.appendChild(div);
    });
}

/* RECOMMEND */
function loadRecommendations() {
    let queries = ["chill", "lofi", "pop", "romantic", "gaming"];

    let container = document.getElementById("recommendList");
    container.innerHTML = "";

    queries.forEach(q => {
        fetch("/search", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ query: q + " music" })
        })
        .then(res => res.json())
        .then(data => {
            data.forEach(item => {
                let div = document.createElement("div");
                div.className = "recommend-item";

                div.innerHTML = `
                    <img src="${item.thumbnail}">
                    <div>
                        <div>${item.title}</div>
                        <small>${item.artist}</small>
                    </div>
                `;

                div.onclick = () => addToQueue(item);
                container.appendChild(div);
            });
        });
    });
}

/* QUEUE */
function addToQueue(item) {
    queue.push(item);
    currentIndex = queue.length - 1;
    playAudio(item.audio);
    updateQueueUI();
}

function updateQueueUI() {
    queueList.innerHTML = "";

    queue.forEach((item, index) => {
        let div = document.createElement("div");
        div.className = "queue-item";
        div.draggable = true;

        div.innerHTML = `
        <div class="queue-left">
            <img src="${item.thumbnail}">
            <div>
                <div>${item.title}</div>
                <small>${item.artist}</small>
            </div>
        </div>

        <div class="queue-menu">
            ⋮
            <div class="menu-dropdown">
                <div onclick="removeFromQueue(${index}); event.stopPropagation()">Remove</div>
                <div onclick="addSongToPlaylist(${index}); event.stopPropagation()">Add to Playlist</div>
            </div>
        </div>
        `;

        div.onclick = () => {
            currentIndex = index;
            playAudio(item.audio);
            updateQueueUI();
        };

        if (index === currentIndex) {
            div.style.background = "#1db95433";
        }

        queueList.appendChild(div);
    });
}

/* PLAYLIST */
function createPlaylist() {
    let name = prompt("Playlist name:");
    if (!name) return;
    playlists[name] = [];
    savePlaylists();
    renderPlaylists();
}

function renderPlaylists() {
    document.getElementById("playlistList").innerHTML = "";

    Object.keys(playlists).forEach(name => {
        let div = document.createElement("div");
        div.innerText = name;
        div.onclick = () => openPlaylist(name);
        document.getElementById("playlistList").appendChild(div);
    });
}

function openPlaylist(name) {
    document.getElementById("homePage").style.display = "none";
    document.getElementById("queuePage").style.display = "none";
    document.getElementById("playlistPage").style.display = "block";

    document.getElementById("playlistTitle").innerText = name;
    let container = document.getElementById("playlistSongs");
    container.innerHTML = "";

    playlists[name].forEach(song => {
        let div = document.createElement("div");
        div.className = "queue-item";

        div.innerHTML = `
            <img src="${song.thumbnail}">
            <div>
                <div>${song.title}</div>
                <small>${song.artist}</small>
            </div>
        `;

        div.onclick = () => playAudio(song.audio);
        container.appendChild(div);
    });
}

function savePlaylists() {
    localStorage.setItem("playlists", JSON.stringify(playlists));
}

/* PLAYER */
function playAudio(url) {
    audio.src = url;
    audio.play();

    let song = queue[currentIndex];

    document.getElementById("nowPlaying").innerText = song?.title || "No song";
    document.getElementById("artistName").innerText = song?.artist || "";
    document.getElementById("playerThumbnail").src = song?.thumbnail || "";

    document.getElementById("playBtn").innerText = "⏸";
}

function togglePlay() {
    let btn = document.getElementById("playBtn");

    if (audio.paused) {
        audio.play();
        btn.innerText = "⏸";
    } else {
        audio.pause();
        btn.innerText = "▶";
    }
}

function playNext() {
    if (!queue.length) return;

    currentIndex = (currentIndex + 1) % queue.length;
    playAudio(queue[currentIndex].audio);
}

function playPrevious() {
    currentIndex = (currentIndex - 1 + queue.length) % queue.length;
    playAudio(queue[currentIndex].audio);
}

function toggleShuffle() { isShuffle = !isShuffle; }
function toggleRepeat() { isRepeat = !isRepeat; }
function setVolume(v) { audio.volume = v; }

/* PROGRESS */
audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;

    document.getElementById("progressBar").value =
        (audio.currentTime / audio.duration) * 100;

    document.getElementById("currentTime").innerText = formatTime(audio.currentTime);
    document.getElementById("durationText").innerText = formatTime(audio.duration);
});

audio.addEventListener("ended", playNext);

function seekAudio(val) {
    audio.currentTime = (val / 100) * audio.duration;
}

function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return `${m}:${s < 10 ? "0" : ""}${s}`;
}

function removeFromQueue(index) {
    queue.splice(index, 1);
    if (index <= currentIndex) currentIndex--;
    updateQueueUI();
}

function addSongToPlaylist(index) {
    let name = prompt("Playlist name:");
    if (playlists[name]) {
        playlists[name].push(queue[index]);
        savePlaylists();
    }
}

/* INIT */
window.onload = () => {
    loadRecommendations();
    renderPlaylists();
};
</script>

</body>
</html>
