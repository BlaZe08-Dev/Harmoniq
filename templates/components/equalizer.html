<div id="equalizerScreen" class="equalizer-screen hidden">
    

    <div class="eq-header">

        <button id="closeEqualizer" class="eq-back-btn">

            ←

        </button>

        <div class="eq-title-group">

            <h1>Equalizer</h1>

            <p>Shape your sound.</p>

        </div>

        <div class="eq-status">

            <span class="eq-status-dot"></span>

        </div>

    </div>

    <div class="eq-visualizer">

        <canvas id="eqVisualizer"></canvas>

    </div>

    <div class="eq-controls">

        <div class="eq-knob" data-band="bass">

            <div class="eq-value">0</div>

            <div class="knob">

                <div class="knob-indicator"></div>

            </div>

            <span>BASS</span>

        </div>

        <div class="eq-knob" data-band="mid">

            <div class="eq-value">0</div>

            <div class="knob">

                <div class="knob-indicator"></div>

            </div>

            <span>MID</span>

        </div>

        <div class="eq-knob" data-band="treble">

            <div class="eq-value">0</div>

            <div class="knob">

                <div class="knob-indicator"></div>

            </div>

            <span>TREBLE</span>

        </div>

    </div>

    <div class="eq-presets"></div>

    <div class="eq-footer"></div>

</div>
