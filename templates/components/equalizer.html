<div id="equalizerScreen" class="equalizer-screen hidden">

    <!-- HEADER -->

    <div class="eq-header">

        <button id="closeEqualizer" class="eq-back-btn">

            ←

        </button>

        <div class="eq-title-group">

            <h1>Equalizer</h1>

            <p>Shape your sound.</p>

        </div>

        <div class="eq-status">

            <span class="eq-status-dot"></span>

        </div>

    </div>


    <!-- VISUALIZER -->

    <div class="eq-visualizer">

        <canvas id="eqVisualizer"></canvas>

    </div>


    <!-- CONTROLS -->

    <div class="eq-controls">

        <!-- BASS -->

        <div class="eq-knob" data-band="bass">

            <div class="eq-knob-value">

                ±0 dB

            </div>

            <div class="eq-knob-wheel">

                <div class="eq-knob-indicator"></div>

            </div>

            <div class="eq-knob-label">

                BASS

            </div>

        </div>


        <!-- MID -->

        <div class="eq-knob" data-band="mid">

            <div class="eq-knob-value">

                ±0 dB

            </div>

            <div class="eq-knob-wheel">

                <div class="eq-knob-indicator"></div>

            </div>

            <div class="eq-knob-label">

                MID

            </div>

        </div>


        <!-- TREBLE -->

        <div class="eq-knob" data-band="treble">

            <div class="eq-knob-value">

                ±0 dB

            </div>

            <div class="eq-knob-wheel">

                <div class="eq-knob-indicator"></div>

            </div>

            <div class="eq-knob-label">

                TREBLE

            </div>

        </div>

    </div>


    <!-- PRESETS -->

    <div class="eq-presets">

        <button
            class="preset-chip active"
            data-preset="flat">

            Flat

        </button>

        <button
            class="preset-chip"
            data-preset="bass-boost">

            Bass Boost

        </button>

        <button
            class="preset-chip"
            data-preset="vocal">

            Vocal

        </button>

        <button
            class="preset-chip"
            data-preset="rock">

            Rock

        </button>

        <button
            class="preset-chip"
            data-preset="jazz">

            Jazz

        </button>

        <button
            class="preset-chip"
            data-preset="classical">

            Classical

        </button>

    </div>


    <!-- FOOTER -->

    <div class="eq-footer">

        <button class="eq-reset-btn">

            Reset

        </button>

    </div>

</div>
